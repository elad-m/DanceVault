services:
  postgres:
    image: postgres:17
    container_name: dancevault-postgres
    environment:
      POSTGRES_USER: dancevault
      POSTGRES_PASSWORD: dancevault
      POSTGRES_DB: dancevault
    ports:
      - "5432:5432"
    volumes:
      - dancevault-postgres-data:/var/lib/postgresql/data

  postgres-test:
    image: postgres:17
    container_name: dancevault-postgres-test
    environment:
      POSTGRES_USER: dancevault
      POSTGRES_PASSWORD: dancevault
      POSTGRES_DB: dancevault_test
    ports:
      - "5433:5432"
    volumes:
      - dancevault-postgres-test-data:/var/lib/postgresql/data
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: dancevault-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dancevault
      MINIO_ROOT_PASSWORD: dancevault-local-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dancevault-minio-data:/data
volumes:
  dancevault-postgres-data:
  dancevault-postgres-test-data:
  dancevault-minio-data:
